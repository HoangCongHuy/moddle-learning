server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Logging
    access_log /var/log/nginx/moodle_access.log;
    error_log  /var/log/nginx/moodle_error.log;

    # Security: block hidden files (dotfiles), except .well-known
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Security: block sensitive files/directories
    location ~* ^/(vendor|node_modules|composer\.(json|lock)|package(-lock)?\.json|phpunit\.xml(\.dist)?|\.git) {
        deny all;
        return 404;
    }

    # Security: block Moodle upgrade/readme files
    location ~* \.(md|txt|dist)$ {
        deny all;
        return 404;
    }

    # Static assets caching
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Main location block - Moodle uses r.php as router
    location / {
        try_files $uri $uri/ /r.php$is_args$args;
    }

    # PHP handling
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        # Save PATH_INFO before try_files potentially changes it
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT    $realpath_root;
        fastcgi_param PATH_INFO        $path_info;
        fastcgi_param SERVER_SOFTWARE  nginx;
        # Pass the correct Host + original port from your browser so Moodle matches the wwwroot
        fastcgi_param HTTP_HOST        $http_host;
        fastcgi_param SERVER_PORT      $real_port;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
}
